---
- name: npm_globals | probe pnpm binary presence
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm/pnpm"
  register: pnpm_binary_stat

- name: npm_globals | assert pnpm is installed before installing globals
  ansible.builtin.assert:
    that:
      - pnpm_binary_stat.stat.exists
      - pnpm_binary_stat.stat.executable | default(false)
    fail_msg: >-
      pnpm is not installed at ~/.local/share/pnpm/pnpm. Run the `languages`
      role first (ansible-playbook playbook.yml --tags languages) so pnpm and
      Node LTS are available before installing global npm packages.

- name: npm_globals | install Claude Code via official install script
  ansible.builtin.shell: >-
    curl -fsSL {{ claude_code_install_url }} | bash
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/claude"

- name: npm_globals | list currently installed pnpm global packages
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm/pnpm list -g --depth=0 --parseable"
  register: pnpm_global_list
  changed_when: false

- name: npm_globals | install global packages via pnpm add -g
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm/pnpm add -g {{ item }}"
  loop: "{{ npm_global_packages }}"
  when: item not in pnpm_global_list.stdout
  ignore_errors: true
